services:
  backend:
    build: ./backend
    ports:
      - "${CLAWSAFE_PORT:-8000}:8000"
    environment:
      - CLAWSAFE_DATABASE_PATH=/data/clawsafe.db
      - CLAWSAFE_OPENCLAW_CONFIG_PATH=/etc/openclaw/config.yaml
      - CLAWSAFE_FRONTEND_URL=http://localhost:3000
      - CLAWSAFE_API_KEY=${CLAWSAFE_API_KEY:-}
      - CLAWSAFE_DEMO_MODE=${CLAWSAFE_DEMO_MODE:-true}
      - CLAWSAFE_SCAN_INTERVAL=${CLAWSAFE_SCAN_INTERVAL:-3600}
      - CLAWSAFE_LOG_LEVEL=${CLAWSAFE_LOG_LEVEL:-INFO}
    volumes:
      - clawsafe-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/api/v1/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_KEY=${CLAWSAFE_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  default:
    name: clawsafe

volumes:
  clawsafe-data:
