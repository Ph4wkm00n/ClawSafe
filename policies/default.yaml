# ClawSafe Default Policy — Secure defaults for all users
version: "1"
name: default

network:
  bind_address: "127.0.0.1"
  allowed_cidrs:
    - "127.0.0.0/8"
  vpn_only: false

tools:
  default_action: ask  # allow | ask | block
  rules:
    - name: web_search
      risk: low
      action: allow
    - name: file_read
      risk: medium
      action: ask
    - name: file_write
      risk: medium
      action: ask
    - name: shell_exec
      risk: high
      action: block
    - name: network_request
      risk: medium
      action: ask

data:
  allowed_mounts:
    - "/app/data"
  backup:
    enabled: true
    frequency: daily
    destination: "/data/backups"

auth:
  enabled: true
  method: token

monitoring:
  scan_interval: 3600  # seconds (1 hour)
  log_format: json
