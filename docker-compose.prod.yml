# Production overlay — adds Caddy reverse proxy with automatic HTTPS
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    ports: []  # Remove direct port exposure

  backend:
    ports: []  # Remove direct port exposure

volumes:
  caddy-data:
  caddy-config:
