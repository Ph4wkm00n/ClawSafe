apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawsafe.fullname" . }}-secret
  labels:
    {{- include "clawsafe.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLAWSAFE_API_KEY: {{ .Values.secrets.apiKey | quote }}
  CLAWSAFE_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  CLAWSAFE_DB_URL: {{ .Values.secrets.dbUrl | quote }}
  CLAWSAFE_SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
