{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clawsafe.fullname" . }}
  labels:
    {{- include "clawsafe.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "clawsafe.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.port }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ include "clawsafe.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.port }}
          - path: /ws
            pathType: Exact
            backend:
              service:
                name: {{ include "clawsafe.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.port }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "clawsafe.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.frontend.port }}
          {{- end }}
    {{- end }}
{{- end }}
