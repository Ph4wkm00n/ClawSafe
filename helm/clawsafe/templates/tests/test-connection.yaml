apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "clawsafe.fullname" . }}-test-connection"
  labels:
    {{- include "clawsafe.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "clawsafe.fullname" . }}-backend:{{ .Values.backend.port }}/api/v1/health']
  restartPolicy: Never
